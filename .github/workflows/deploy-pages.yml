name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "demo/demo-full.gif"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# One in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: build site artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          set -euo pipefail
          # Host the landing at the publish root so https://<user>.github.io/nabu/
          # serves it directly — no redirect, no /site/landing/ URL. The landing
          # is authored under site/landing/ with paths relative to that dir
          # (../design-system, ../../demo); rewrite those to the flattened root
          # layout below. landing.css references no assets, so it is copied as-is.
          mkdir -p _site/demo
          cp site/landing/landing.css _site/landing.css
          cp -R site/design-system _site/design-system
          cp demo/demo-full.gif _site/demo/demo-full.gif
          sed -E \
            -e 's#\.\./\.\./demo/#demo/#g' \
            -e 's#\.\./design-system/#design-system/#g' \
            site/landing/index.html > _site/index.html
          # Fail loudly if any unrewritten ../ path remains.
          if grep -nE '\.\./' _site/index.html; then
            echo "::error::unrewritten relative path in staged index.html"; exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to Pages
    needs: build
    # Build runs on PRs to validate staging; only main deploys.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
