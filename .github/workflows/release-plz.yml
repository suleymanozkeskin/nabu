name: release-plz

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens or updates a "release" PR that bumps the shared workspace version and
  # regenerates changelogs from the Conventional Commits since the last release.
  # Review and merge that PR to cut a release.
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'suleymanozkeskin' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # A PAT, not GITHUB_TOKEN: the built-in token cannot open PRs when the
          # repo restricts it, and PRs it opens do not trigger CI, so the
          # required status checks never run and the branch ruleset blocks the
          # merge. A PAT-opened PR clears both.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # When the release PR merges (the version-bump commit lands on main), publish
  # every changed crate to crates.io in dependency order and create the GitHub
  # release and tags. No-ops when there is nothing new to release.
  release:
    name: release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'suleymanozkeskin' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
